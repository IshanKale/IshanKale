<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 200" width="100%" height="200">
  <defs>
    <style>
      @import url('https://fonts.googleapis.com/css2?family=Press+Start+2P&amp;family=Pixelify+Sans:wght@400;700&amp;display=swap');
      .terminal-header {
        fill: #171717;
        stroke: #575757;
        stroke-width: 2;
      }
      .dot {
        r: 6;
      }
      .dot-red { fill: #ff6b6b; }
      .dot-yellow { fill: #ffd43b; }
      .dot-green { fill: #51cf66; }
      .title-text {
        font-family: 'Press Start 2P', monospace;
        font-size: 32px;
        fill: #ffd43b;
        font-weight: bold;
      }
      .subtitle-text {
        font-family: 'Pixelify Sans', monospace;
        font-size: 22px;
        fill: #f5f5f5;
      }
      .console-text {
        font-family: 'Press Start 2P', monospace;
        font-size: 12px;
        fill: #a8a8a8;
      }
      .green-text {
        fill: #51cf66;
      }
    </style>
  </defs>

  <!-- Terminal Window Frame -->
  <rect x="2" y="2" width="796" height="196" rx="4" fill="#171717" stroke="#575757" stroke-width="2" />
  
  <!-- Terminal Header Bar -->
  <rect x="2" y="2" width="796" height="32" rx="4" fill="#111111" stroke="#575757" stroke-width="2" />
  
  <!-- Window Controls -->
  <circle cx="20" cy="18" r="6" class="dot dot-red" />
  <circle cx="40" cy="18" r="6" class="dot dot-yellow" />
  <circle cx="60" cy="18" r="6" class="dot dot-green" />
  <text x="400" y="22" fill="#a8a8a8" font-family="'Press Start 2P', monospace" font-size="10" text-anchor="middle">ishan@portfolio: ~</text>

  <!-- Terminal Body Content -->
  <text x="30" y="75" class="console-text">visitor@ishan:~$ <tspan fill="#f5f5f5">whoami</tspan></text>
  
  <!-- Title Name -->
  <text x="30" y="125" class="title-text">ISHAN KALE</text>
  
  <!-- Subtitle -->
  <text x="30" y="165" class="subtitle-text">Full-Stack &amp; AI Developer <tspan fill="#51cf66">_</tspan></text>
</svg>